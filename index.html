<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='0.9em' font-size='90'%3E%F0%9F%92%AB%3C/text%3E%3C/svg%3E" />
  <title>主選單 Menu</title>
  <style>
    :root {
      --bg-1: #0b1324;
      --bg-2: #132a45;
      --panel: rgba(15, 23, 42, 0.82);
      --text: #e2e8f0;
      --muted: #94a3b8;
      --accent: #38bdf8;
      --accent-2: #0ea5e9;
      --border: rgba(148, 163, 184, 0.3);
    }

    * { box-sizing: border-box; }

    @keyframes pageFadeIn {
      from {
        opacity: 0;
        transform: translateY(16px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      font-family: "Segoe UI", "Noto Sans TC", sans-serif;
      color: var(--text);
      background:
        linear-gradient(145deg, rgba(11, 19, 36, 0.75), rgba(19, 42, 69, 0.75)),
        radial-gradient(circle at 20% 20%, rgba(56, 189, 248, 0.15), transparent 40%),
        radial-gradient(circle at 80% 80%, rgba(14, 165, 233, 0.15), transparent 35%),
        url("menu-picr.jpg") center/cover no-repeat;
    }

    .menu-card {
      width: min(680px, 100%);
      border: 1px solid var(--border);
      border-radius: 18px;
      background: var(--panel);
      backdrop-filter: blur(4px);
      box-shadow: 0 24px 45px rgba(0, 0, 0, 0.35);
      padding: 28px;
      text-align: center;
      animation: pageFadeIn 0.75s ease-out both;
    }

    .menu-actions,
    .github-link {
      animation: pageFadeIn 0.95s ease-out both;
    }

    @media (prefers-reduced-motion: reduce) {
      .menu-card,
      .menu-actions,
      .github-link {
        animation: none;
      }
    }

    .student-header {
      margin-bottom: 16px;
      padding: 10px 12px;
      border: 1px solid rgba(148, 163, 184, 0.25);
      border-radius: 10px;
      background: rgba(2, 6, 23, 0.45);
      text-align: left;
    }

    .student-header-title {
      margin: 0 0 6px;
      font-size: 1rem;
      color: #dbeafe;
    }

    .student-header-meta {
      margin: 0;
      color: #cbd5e1;
      font-size: 0.92rem;
      line-height: 1.55;
    }

    h1 {
      margin: 0 0 10px;
      font-size: clamp(1.6rem, 2.8vw, 2rem);
      letter-spacing: 0.02em;
    }

    p {
      margin: 0;
      color: var(--muted);
      line-height: 1.6;
    }

    .menu-actions {
      margin-top: 22px;
      display: flex;
      justify-content: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    .menu-link {
      display: inline-block;
      min-width: 220px;
      padding: 12px 16px;
      border-radius: 10px;
      text-decoration: none;
      text-align: center;
      color: #f8fafc;
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      border: 1px solid rgba(125, 211, 252, 0.6);
      font-weight: 600;
      transition: transform 0.25s ease, box-shadow 0.25s ease, background 0.25s ease, border-color 0.25s ease;
    }

    .menu-link:hover {
      transform: translateY(-2px);
      background: linear-gradient(135deg, #f97316, #eab308, #22c55e, #3b82f6, #ec4899);
      border-color: rgba(255, 255, 255, 0.65);
      box-shadow: 0 12px 24px rgba(244, 114, 182, 0.35), 0 0 22px rgba(34, 211, 238, 0.28);
    }

    .github-link {
      margin-top: 14px;
      font-size: 0.92rem;
      color: #bfdbfe;
    }

    .github-link a {
      color: #7dd3fc;
      text-decoration: none;
      border-bottom: 1px solid transparent;
      transition: border-color 0.2s ease;
    }

    .github-link a:hover {
      border-bottom-color: #7dd3fc;
    }

    @media (max-width: 560px) {
      .menu-card {
        padding: 22px 16px;
      }

      .menu-link {
        width: 100%;
        min-width: 0;
      }
    }
  </style>
</head>
<body>
  <main class="menu-card">
    <div class="student-header">
      <h2 class="student-header-title">個人資訊</h2>
      <p class="student-header-meta">姓名：潘宇綸 | 學號：11428109 | 班級：電機一甲</p>
    </div>

    <h1>演算法學習網站</h1>
    <p>這裡是主選單，請點選下方按鈕進入排序法、搜尋法或自我介紹頁面。</p>

    <div class="menu-actions">
      <a class="menu-link" href="sort-html.html">學習排序法</a>
      <a class="menu-link" href="search.html">學習搜尋法</a>
      <a class="menu-link" href="self.html">關於我</a>
    </div>

    <p class="github-link">
      GitHub：<a href="https://github.com/allencreeperqq" target="_blank" rel="noopener noreferrer">https://github.com/allencreeperqq</a>
    </p>
  </main>
</body>
</html>
