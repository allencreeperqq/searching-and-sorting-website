<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='0.9em' font-size='90'%3E%F0%9F%92%AB%3C/text%3E%3C/svg%3E" />
  <title>主選單 Menu</title>
  <style>
    :root {
      --bg-1: #0b1324;
      --bg-2: #132a45;
      --panel: rgba(15, 23, 42, 0.82);
      --text: #e2e8f0;
      --muted: #94a3b8;
      --accent: #38bdf8;
      --accent-2: #0ea5e9;
      --border: rgba(148, 163, 184, 0.3);
    }

    * { box-sizing: border-box; }

    @keyframes pageFadeIn {
      from {
        opacity: 0;
        transform: translateY(16px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes mascotRiseIn {
      from {
        opacity: 0;
        transform: translateY(14px) scale(0.96);
      }
      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    @keyframes mascotFloat {
      0%,
      100% {
        transform: translateY(0);
      }
      50% {
        transform: translateY(-6px);
      }
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      font-family: "Segoe UI", "Noto Sans TC", sans-serif;
      color: var(--text);
      background:
        linear-gradient(145deg, rgba(11, 19, 36, 0.75), rgba(19, 42, 69, 0.75)),
        radial-gradient(circle at 20% 20%, rgba(56, 189, 248, 0.15), transparent 40%),
        radial-gradient(circle at 80% 80%, rgba(14, 165, 233, 0.15), transparent 35%),
        url("menu-picr2.jpg") center/cover no-repeat;
    }

    .menu-card {
      width: min(680px, 100%);
      border: 1px solid var(--border);
      border-radius: 18px;
      background: var(--panel);
      backdrop-filter: blur(4px);
      box-shadow: 0 24px 45px rgba(0, 0, 0, 0.35);
      padding: 28px;
      text-align: center;
      animation: pageFadeIn 0.75s ease-out both;
    }

    .menu-actions,
    .github-link {
      animation: pageFadeIn 0.95s ease-out both;
    }

    @media (prefers-reduced-motion: reduce) {
      .menu-card,
      .menu-actions,
      .github-link {
        animation: none;
      }
    }

    .student-header {
      margin-bottom: 16px;
      padding: 10px 12px;
      border: 1px solid rgba(148, 163, 184, 0.25);
      border-radius: 10px;
      background: rgba(2, 6, 23, 0.45);
      text-align: left;
    }

    .student-header-title {
      margin: 0 0 6px;
      font-size: 1rem;
      color: #dbeafe;
    }

    .student-header-meta {
      margin: 0;
      color: #cbd5e1;
      font-size: 0.92rem;
      line-height: 1.55;
    }

    h1 {
      margin: 0 0 10px;
      font-size: clamp(1.6rem, 2.8vw, 2rem);
      letter-spacing: 0.02em;
    }

    p {
      margin: 0;
      color: var(--muted);
      line-height: 1.6;
    }

    .menu-actions {
      margin-top: 22px;
      display: flex;
      justify-content: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    .menu-link {
      display: inline-block;
      min-width: 220px;
      padding: 12px 16px;
      border-radius: 10px;
      text-decoration: none;
      text-align: center;
      color: #f8fafc;
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      border: 1px solid rgba(125, 211, 252, 0.6);
      font-weight: 600;
      transition: transform 0.25s ease, box-shadow 0.25s ease, background 0.25s ease, border-color 0.25s ease;
    }

    .menu-link:hover {
      transform: translateY(-2px);
      background: linear-gradient(135deg, #f97316, #eab308, #22c55e, #3b82f6, #ec4899);
      border-color: rgba(255, 255, 255, 0.65);
      box-shadow: 0 12px 24px rgba(244, 114, 182, 0.35), 0 0 22px rgba(34, 211, 238, 0.28);
    }

    .github-link {
      margin-top: 14px;
      font-size: 0.92rem;
      color: #bfdbfe;
    }

    .github-link a {
      color: #7dd3fc;
      text-decoration: none;
      border-bottom: 1px solid transparent;
      transition: border-color 0.2s ease;
    }

    .github-link a:hover {
      border-bottom-color: #7dd3fc;
    }

    .mascot-widget {
      position: fixed;
      right: 18px;
      bottom: 16px;
      display: grid;
      justify-items: end;
      gap: 8px;
      z-index: 35;
      animation: mascotRiseIn 0.65s ease-out both;
      cursor: pointer;
    }

    .mascot-widget:focus-visible {
      outline: 2px solid rgba(125, 211, 252, 0.95);
      outline-offset: 4px;
      border-radius: 12px;
    }

    .mascot-bubble {
      max-width: 230px;
      padding: 8px 12px;
      border-radius: 12px;
      border: 1px solid rgba(148, 163, 184, 0.35);
      background: rgba(15, 23, 42, 0.86);
      color: #e0f2fe;
      font-size: 0.9rem;
      line-height: 1.45;
      box-shadow: 0 10px 24px rgba(0, 0, 0, 0.28);
      transition: opacity 0.2s ease;
    }

    .mascot-bubble.is-switching {
      opacity: 0.35;
    }

    .mascot-image {
      width: clamp(96px, 11vw, 144px);
      height: auto;
      filter: drop-shadow(0 10px 18px rgba(0, 0, 0, 0.35));
      animation: mascotFloat 3s ease-in-out infinite;
      transform-origin: center bottom;
      user-select: none;
      pointer-events: none;
    }

    .mascot-tip {
      margin: 0;
      color: #bae6fd;
      font-size: 0.8rem;
      line-height: 1.3;
      text-shadow: 0 2px 8px rgba(2, 6, 23, 0.45);
    }

    .copyright-note {
      position: fixed;
      left: 14px;
      bottom: 12px;
      margin: 0;
      padding: 8px 10px;
      border-radius: 10px;
      border: 1px solid rgba(148, 163, 184, 0.25);
      background: rgba(2, 6, 23, 0.72);
      color: #bfdbfe;
      font-size: 0.78rem;
      line-height: 1.4;
      z-index: 30;
      max-width: min(58vw, 380px);
    }

    @media (max-width: 560px) {
      .menu-card {
        padding: 22px 16px;
      }

      .menu-link {
        width: 100%;
        min-width: 0;
      }

      .mascot-widget {
        right: 10px;
        bottom: 10px;
      }

      .mascot-bubble {
        max-width: min(70vw, 210px);
        font-size: 0.82rem;
      }

      .mascot-image {
        width: clamp(80px, 22vw, 112px);
      }

      .mascot-tip {
        font-size: 0.74rem;
      }

      .copyright-note {
        left: 10px;
        bottom: 10px;
        max-width: 68vw;
        font-size: 0.72rem;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      .mascot-widget,
      .mascot-image {
        animation: none;
      }
    }
  </style>
</head>
<body>
  <main class="menu-card">
    <div class="student-header">
      <h2 class="student-header-title">個人資訊</h2>
      <p class="student-header-meta">姓名：潘宇綸 | 學號：11428109 | 班級：電機一甲</p>
    </div>

    <h1>演算法學習網站</h1>
    <p>這裡是主選單，請點選下方按鈕進入排序法、搜尋法或自我介紹頁面。</p>

    <div class="menu-actions">
      <a class="menu-link" href="sort-html.html">學習排序法</a>
      <a class="menu-link" href="search.html">學習搜尋法</a>
      <a class="menu-link" href="self.html">關於我</a>
      <a class="menu-link" href="https://allencreeperqq.github.io/personal-website/" target="_blank" rel="noopener noreferrer">我的個人部落格</a>
    </div>

    <p class="github-link">
      GitHub：<a href="https://github.com/allencreeperqq" target="_blank" rel="noopener noreferrer">https://github.com/allencreeperqq</a>
    </p>
  </main>

  <aside class="mascot-widget" aria-label="kanatachan 歡迎訊息" role="button" tabindex="0" aria-live="polite">
    <div class="mascot-bubble" id="mascotBubble">kanatachan：歡迎使用者來到演算法學習網站。</div>
    <img class="mascot-image" src="kanatasochan_6.png" alt="kanatachan" />
    <p class="mascot-tip">點我會改變!</p>
  </aside>

  <p class="copyright-note">本網站之所有圖片請勿私自使用 版權所有於海外公司</p>

  <script>
    const mascotWidget = document.querySelector('.mascot-widget');
    const mascotBubble = document.getElementById('mascotBubble');
    const welcomeMessages = [
      'kanatachan：歡迎使用者來到演算法學習網站。',
      'kanatachan：可以先從搜尋法開始，流程很清楚。',
      'kanatachan：想挑戰的話，試試看排序法的逐步動畫。',
      'kanatachan：祝你學習順利，今天也一起加油。'
    ];
    let messageIndex = 0;

    function rotateMascotMessage() {
      if (!mascotBubble) return;
      messageIndex = (messageIndex + 1) % welcomeMessages.length;
      mascotBubble.classList.add('is-switching');
      setTimeout(() => {
        mascotBubble.textContent = welcomeMessages[messageIndex];
        mascotBubble.classList.remove('is-switching');
      }, 120);
    }

    if (mascotWidget) {
      mascotWidget.addEventListener('click', rotateMascotMessage);
      mascotWidget.addEventListener('keydown', (event) => {
        if (event.key === 'Enter' || event.key === ' ') {
          event.preventDefault();
          rotateMascotMessage();
        }
      });
    }
  </script>
</body>
</html>
